<svg xmlns="http://www.w3.org/2000/svg" width="960" height="760" viewBox="0 0 960 760">
  <rect width="100%" height="100%" fill="#ffffff"/>
  <text x="480" y="42" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="28" font-weight="700" text-anchor="middle">CF 935C Sample 1: Optimal Wi-Fi Circle</text>
  <text x="480" y="74" fill="#4b5563" font-family="Arial, Helvetica, sans-serif" font-size="18" text-anchor="middle">Input: R=5, flat center C=(3,3), laptop P=(1,1)</text>

  <circle cx="380.000" cy="380.000" r="266.667" fill="#dbeafe" stroke="#2563eb" stroke-width="4" />
  <circle cx="420.948" cy="339.052" r="208.758" fill="#fee2e2" stroke="#dc2626" stroke-width="4" stroke-dasharray="10 7"/>
  <line x1="273.333" y1="486.667" x2="568.562" y2="191.438" stroke="#7c3aed" stroke-width="4" stroke-linecap="round" />
  <line x1="380.000" y1="380.000" x2="568.562" y2="191.438" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 6"/>
  <line x1="420.948" y1="339.052" x2="568.562" y2="191.438" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-dasharray="6 6"/>

  <circle cx="380.000" cy="380.000" r="6" fill="#2563eb" stroke="#111827" stroke-width="1.5"/>
  <circle cx="273.333" cy="486.667" r="6" fill="#111827" stroke="#111827" stroke-width="1.5"/>
  <circle cx="420.948" cy="339.052" r="6" fill="#dc2626" stroke="#111827" stroke-width="1.5"/>
  <circle cx="568.562" cy="191.438" r="6" fill="#16a34a" stroke="#111827" stroke-width="1.5"/>

  <text x="350.667" y="397.067" fill="#1d4ed8" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" text-anchor="end">C flat center (3,3)</text>
  <text x="263.733" y="502.667" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" text-anchor="end">P laptop (1,1)</text>
  <text x="441.214" y="315.052" fill="#b91c1c" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" text-anchor="start">A access point</text>
  <text x="581.895" y="186.105" fill="#15803d" font-family="Arial, Helvetica, sans-serif" font-size="17" font-weight="600" text-anchor="start">B tangent point</text>

  <rect x="615" y="585" width="305" height="116" rx="10" fill="#f9fafb" stroke="#d1d5db"/>
  <text x="635" y="615" fill="#111827" font-family="Arial, Helvetica, sans-serif" font-size="18" font-weight="700">Construction</text>
  <text x="635" y="642" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="16">B is farthest flat boundary point from P.</text>
  <text x="635" y="667" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="16">Optimal circle has diameter P-B.</text>
  <text x="635" y="692" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="16">A=(3.76776695, 3.76776695), r=3.91421356</text>

  <line x1="84" y1="653" x2="134" y2="653" stroke="#2563eb" stroke-width="4"/>
  <text x="146" y="659" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="16">flat boundary, radius 5</text>
  <line x1="84" y1="681" x2="134" y2="681" stroke="#dc2626" stroke-width="4" stroke-dasharray="10 7"/>
  <text x="146" y="687" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="16">chosen Wi-Fi coverage circle</text>
  <line x1="84" y1="709" x2="134" y2="709" stroke="#7c3aed" stroke-width="4"/>
  <text x="146" y="715" fill="#374151" font-family="Arial, Helvetica, sans-serif" font-size="16">diameter from laptop to far boundary</text>
