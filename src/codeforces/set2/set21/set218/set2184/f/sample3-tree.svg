<svg xmlns="http://www.w3.org/2000/svg" width="900" height="620" viewBox="0 0 900 620">
  <rect width="900" height="620" fill="#ffffff"/>

  <text x="450" y="54" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#1f2937">
    Codeforces 2184F - Sample 3 Tree
  </text>
  <text x="450" y="88" text-anchor="middle" font-family="Arial, sans-serif" font-size="16" fill="#4b5563">
    Rooted at 1; highlighted vertices 2, 7, and 9 form one valid shake set.
  </text>

  <defs>
    <style>
      .edge { stroke: #64748b; stroke-width: 4; stroke-linecap: round; }
      .node { fill: #eef2ff; stroke: #475569; stroke-width: 3; }
      .shake { fill: #fef3c7; stroke: #b45309; stroke-width: 4; }
      .leaf { fill: #ecfdf5; stroke: #047857; stroke-width: 3; }
      .label { font-family: Arial, sans-serif; font-size: 24px; font-weight: 700; text-anchor: middle; dominant-baseline: central; fill: #111827; }
      .caption { font-family: Arial, sans-serif; font-size: 14px; text-anchor: middle; fill: #374151; }
    </style>
  </defs>

  <line class="edge" x1="450" y1="145" x2="285" y2="250"/>
  <line class="edge" x1="450" y1="145" x2="615" y2="250"/>
  <line class="edge" x1="285" y1="250" x2="170" y2="365"/>
  <line class="edge" x1="285" y1="250" x2="355" y2="365"/>
  <line class="edge" x1="355" y1="365" x2="355" y2="480"/>
  <line class="edge" x1="615" y1="250" x2="545" y2="365"/>
  <line class="edge" x1="615" y1="250" x2="725" y2="365"/>
  <line class="edge" x1="725" y1="365" x2="725" y2="480"/>

  <circle class="node" cx="450" cy="145" r="34"/>
  <text class="label" x="450" y="145">1</text>

  <circle class="shake" cx="285" cy="250" r="36"/>
  <text class="label" x="285" y="250">2</text>

  <circle class="node" cx="615" cy="250" r="34"/>
  <text class="label" x="615" y="250">3</text>

  <circle class="leaf" cx="170" cy="365" r="34"/>
  <text class="label" x="170" y="365">4</text>

  <circle class="node" cx="355" cy="365" r="34"/>
  <text class="label" x="355" y="365">5</text>

  <circle class="leaf" cx="355" cy="480" r="34"/>
  <text class="label" x="355" y="480">6</text>

  <circle class="shake" cx="545" cy="365" r="36"/>
  <text class="label" x="545" y="365">7</text>

  <circle class="node" cx="725" cy="365" r="34"/>
  <text class="label" x="725" y="365">8</text>

  <circle class="shake" cx="725" cy="480" r="36"/>
  <text class="label" x="725" y="480">9</text>

  <g transform="translate(80 535)">
    <circle class="node" cx="0" cy="0" r="14"/>
    <text class="caption" x="52" y="5">internal/root</text>
    <circle class="leaf" cx="220" cy="0" r="14"/>
    <text class="caption" x="265" y="5">leaf</text>
    <circle class="shake" cx="385" cy="0" r="14"/>
    <text class="caption" x="452" y="5">shaken vertex</text>
  </g>
</svg>
